<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Home Security Hub - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <div class="logo justify-center">
          <span class="logo-icon">
            <svg width="24" height="24" viewBox="0 0 20 20" fill="none">
              <rect x="2" y="2" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.9"/>
              <rect x="11" y="2" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.5"/>
              <rect x="2" y="11" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.5"/>
              <rect x="11" y="11" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.9"/>
            </svg>
          </span>
          <span class="logo-text" style="font-size: 20px;">SecureHome</span>
        </div>
        <p class="login-subtitle">System Authentication Required</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="username">Administrator ID</label>
          <input type="text" id="username" placeholder="Enter username" autocomplete="username">
        </div>
        
        <div class="form-group">
          <label for="password">Passkey</label>
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
        </div>

        <div id="loginError" class="login-error hidden">
          Invalid credentials. Please try again.
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Authenticate</button>
      </form>

      <div class="login-footer">
        <p>Restricted access. All login attempts are logged and monitored.</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
